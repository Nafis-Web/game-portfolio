<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameCom</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
        url("https://images.unsplash.com/photo-1598550880863-4e8aa3d0f2f0?q=80&w=1600&auto=format&fit=crop")
        center/cover no-repeat;
      z-index: -2;
      filter: brightness(0.6) contrast(1.1) blur(2px);
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(255,102,0,0.15), transparent 60%);
      z-index: -1;
    }

    header {
      background: linear-gradient(90deg, #000000, #ff6600);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ff8800;
      box-shadow: 0 0 20px rgba(255, 102, 0, 0.4);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-section img {
      width: 60px;
      filter: drop-shadow(0 0 10px orange);
    }

    .logo-section h1 {
      font-size: 2.4rem;
      color: #ff9900;
      text-shadow: 0 0 10px #ff6600;
    }

    nav {
      display: flex;
      gap: 10px;
    }

    nav button {
      background: black;
      color: #ff9900;
      border: 2px solid #ff9900;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      background: #ff6600;
      color: white;
      transform: scale(1.05);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .home {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 100px);
      text-align: center;
      padding: 20px;
    }

    .home-icons {
      font-size: 2.2rem;
      margin-bottom: 20px;
      letter-spacing: 12px;
      text-shadow: 0 0 10px rgba(255,102,0,0.6);
    }

    .home h2 {
      font-size: 4rem;
      color: #ff9900;
      text-shadow: 0 0 15px #ff6600, 0 0 30px rgba(255,102,0,0.5);
      margin-bottom: 10px;
    }

    .home p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #eaeaea;
    }

    .home button {
      background: linear-gradient(90deg, #ff6600, #ff9900);
      border: none;
      padding: 14px 28px;
      font-size: 1rem;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,102,0,0.5);
      transition: 0.3s;
    }

    .home button:hover {
      transform: scale(1.08);
    }

    .dashboard {
      display: flex;
      min-height: calc(100vh - 100px);
    }

    .sidebar {
      width: 250px;
      background: #111;
      border-right: 2px solid #ff6600;
      padding: 25px;
    }

    .sidebar h3 {
      color: #ff9900;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: black;
      border: 1px solid #ff6600;
      color: #ff9900;
      cursor: pointer;
      transition: 0.3s;
    }

    .sidebar button:hover,
    .sidebar button.active-btn {
      background: #ff6600;
      color: white;
      transform: scale(1.05);
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .game-stage {
      position: relative;
      width: 100%;
      border: 2px solid #ff6600;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.75);
    }

    .toolbar {
      background: linear-gradient(90deg, #1a1a1a, #ff6600);
      padding: 15px 20px;
      font-size: 1.2rem;
      font-weight: bold;
      border-bottom: 2px solid #ff8800;
    }

    .game-frame {
      width: 100%;
      height: 82vh;
      min-height: 780px;
      border: none;
      display: block;
      background: black;
    }

    .placeholder {
      position: absolute;
      top: 60px;
      left: 0;
      width: 100%;
      height: calc(100% - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #ff9900;
      background: rgba(0,0,0,0.85);
      text-shadow: 0 0 10px #ff6600;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 900px) {
      .dashboard {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        display: flex;
        justify-content: space-around;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-right: none;
        border-bottom: 2px solid #ff6600;
      }

      .sidebar h3 {
        display: none;
      }

      .sidebar button {
        flex: 1;
        width: auto;
        margin-bottom: 0;
      }

      .content {
        padding: 16px;
      }

      .game-frame {
        height: 78vh;
        min-height: 700px;
      }
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
        padding: 20px;
      }

      .logo-section {
        flex-direction: column;
        gap: 10px;
      }

      nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .sidebar {
        flex-direction: row;
        overflow-x: auto;
        justify-content: flex-start;
      }

      .sidebar button {
        font-size: 12px;
        padding: 10px 12px;
        white-space: nowrap;
        min-width: 120px;
      }

      .game-frame {
        height: 72vh;
        min-height: 620px;
      }

      .toolbar {
        font-size: 1rem;
        text-align: center;
      }

      .home h2 {
        font-size: 2.5rem;
      }

      .home p {
        font-size: 1rem;
      }

      .home-icons {
        font-size: 1.7rem;
        letter-spacing: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <header>
    <div class="logo-section">
      <img src="https://cdn-icons-png.flaticon.com/512/808/808439.png" alt="Game Controller Logo">
      <h1>GameCom</h1>
    </div>

    <nav>
      <button onclick="goHome()">Home</button>
      <button onclick="showPanel('dashboardPanel')">Menu</button>
    </nav>
  </header>

  <section id="homePanel" class="panel active">
    <div class="home">
      <div class="home-icons">🎮 👾 🔥 ⚡</div>
      <h2>Play Loud.</h2>
      <p>Simple. Clean. Gaming energy.</p>
      <button onclick="showPanel('dashboardPanel')">Enter</button>
    </div>
  </section>

  <section id="dashboardPanel" class="panel">
    <div class="dashboard">
      <aside class="sidebar">
        <h3>Menu</h3>
        <button class="game-btn" data-path="snake/snake.html">Snake</button>
        <button class="game-btn" data-path="tetris/tetris.html">Tetris</button>
        <button class="game-btn" data-path="pong/pong.html">Ping Pong</button>
        <button class="game-btn" data-path="shooter.html">Space Shooter</button>
      </aside>

      <main class="content">
        <div class="game-stage">
          <div id="currentGame" class="toolbar">Select a Game</div>

          <div id="placeholder" class="placeholder">
            🎮 Select a game to start
          </div>

          <iframe
            id="gameFrame"
            class="game-frame"
            title="GameCom game display area. No game selected yet."
            src="about:blank">
          </iframe>
        </div>
      </main>
    </div>
  </section>

  <script>
    const gameFrame = document.getElementById("gameFrame");
    const currentGame = document.getElementById("currentGame");
    const placeholder = document.getElementById("placeholder");
    const gameButtons = document.querySelectorAll(".game-btn");

    function showPanel(panelId) {
      document.querySelectorAll(".panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.getElementById(panelId).classList.add("active");
    }

    function formatGameTitle(path) {
      const fileName = path.split("/").pop().replace(".html", "");
      return fileName
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function resetGameStage() {
      gameFrame.src = "about:blank";
      gameFrame.title = "GameCom game display area. No game selected yet.";
      currentGame.textContent = "Select a Game";
      placeholder.style.display = "flex";
      gameButtons.forEach(button => button.classList.remove("active-btn"));
    }

    function goHome() {
      resetGameStage();
      showPanel("homePanel");
    }

    function loadGame(path, btn) {
      const gameTitle = formatGameTitle(path);

      gameFrame.src = path;
      gameFrame.title = `GameCom game display area. Currently loaded: ${gameTitle}.`;
      currentGame.textContent = gameTitle;
      placeholder.style.display = "none";

      gameButtons.forEach(button => button.classList.remove("active-btn"));
      if (btn) {
        btn.classList.add("active-btn");
      }

      showPanel("dashboardPanel");

      setTimeout(() => {
        gameFrame.focus();
      }, 100);
    }

    gameButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        const path = btn.getAttribute("data-path");
        loadGame(path, btn);
      });
    });
  </script>
</body>
</html>
