<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0b;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(255,102,0,0.18), transparent 35%),
        linear-gradient(180deg, #050505 0%, #111111 100%);
    }

    .game-shell {
      width: 100%;
      height: 100%;
      min-height: 500px;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let w = 1000;
    let h = 600;

    const state = {
      mouseX: null,
      leftPressed: false,
      rightPressed: false,
      mouseEnabled: true,
      lastMouseX: null,
      score: 0,
      lives: 3,
      level: 1,
      paused: false,
      started: false,
      gameOver: false
    };

    const settings = {
      outerMargin: 28,
      gap: 18,
      panelRatio: 0.22,

      batWidth: 180,
      batHeight: 16,
      batSpeed: 8,
      batBottomMargin: 40,

      ballRadius: 14,
      ballSpeedX: 5,
      ballSpeedY: -5,

      blockCols: 6,
      blockRows: 4,
      blockW: 96,
      blockH: 22,
      blockGap: 12,
      blockTopMargin: 70,

      minGameHeight: 500
    };

    let gameRect = {};
    let sideRect = {};
    let bat = {};
    let ball = {};
    let blocks = [];

    function resizeCanvas() {
      const shell = document.querySelector(".game-shell");
      const rect = shell.getBoundingClientRect();

      canvas.width = Math.max(900, Math.floor(rect.width));
      canvas.height = Math.max(settings.minGameHeight, Math.floor(rect.height));

      w = canvas.width;
      h = canvas.height;

      recalcLayout();

      if (!state.started || state.gameOver) {
        resetBatAndBall();
      } else {
        clampBat();
        clampBallInside();
      }
    }

    function recalcLayout() {
      const usableW = w - (settings.outerMargin * 2) - settings.gap;
      const panelW = Math.floor(usableW * settings.panelRatio);
      const gameW = usableW - panelW;
      const gameH = h - (settings.outerMargin * 2);

      gameRect = {
        x: settings.outerMargin,
        y: settings.outerMargin,
        w: gameW,
        h: gameH
      };

      sideRect = {
        x: gameRect.x + gameRect.w + settings.gap,
        y: settings.outerMargin,
        w: panelW,
        h: gameH
      };
    }

    function resetBatAndBall() {
      bat = {
        w: settings.batWidth,
        h: settings.batHeight,
        x: gameRect.x + gameRect.w / 2 - settings.batWidth / 2,
        y: gameRect.y + gameRect.h - settings.batBottomMargin - settings.batHeight,
        speed: settings.batSpeed
      };

      ball = {
        x: gameRect.x + gameRect.w / 2,
        y: gameRect.y + gameRect.h / 2,
        vx: settings.ballSpeedX,
        vy: settings.ballSpeedY,
        r: settings.ballRadius
      };

      buildBlocks();
    }

    function buildBlocks() {
      blocks = [];

      const totalW =
        settings.blockCols * settings.blockW +
        (settings.blockCols - 1) * settings.blockGap;

      const startX = gameRect.x + gameRect.w / 2 - totalW / 2;
      const startY = gameRect.y + settings.blockTopMargin;

      for (let row = 0; row < settings.blockRows; row++) {
        for (let col = 0; col < settings.blockCols; col++) {
          blocks.push({
            x: startX + col * (settings.blockW + settings.blockGap),
            y: startY + row * (settings.blockH + settings.blockGap),
            w: settings.blockW,
            h: settings.blockH,
            hp: Math.max(1, 3 - Math.min(row, 2))
          });
        }
      }
    }

    function clampBat() {
      if (bat.x < gameRect.x) bat.x = gameRect.x;
      if (bat.x + bat.w > gameRect.x + gameRect.w) {
        bat.x = gameRect.x + gameRect.w - bat.w;
      }
    }

    function clampBallInside() {
      if (ball.x - ball.r < gameRect.x) ball.x = gameRect.x + ball.r;
      if (ball.x + ball.r > gameRect.x + gameRect.w) ball.x = gameRect.x + gameRect.w - ball.r;
      if (ball.y - ball.r < gameRect.y) ball.y = gameRect.y + ball.r;
      if (ball.y + ball.r > gameRect.y + gameRect.h) ball.y = gameRect.y + gameRect.h - ball.r;
    }

    function resetLevelBall() {
      ball.x = gameRect.x + gameRect.w / 2;
      ball.y = gameRect.y + gameRect.h / 2;
      ball.vx = settings.ballSpeedX * (Math.random() > 0.5 ? 1 : -1);
      ball.vy = -Math.abs(settings.ballSpeedY);
    }

    function updateBat() {
      if (state.mouseEnabled && state.mouseX !== null) {
        bat.x = state.mouseX - bat.w / 2;
      }

      if (state.leftPressed) {
        bat.x -= bat.speed;
        state.mouseEnabled = false;
      }
      if (state.rightPressed) {
        bat.x += bat.speed;
        state.mouseEnabled = false;
      }

      clampBat();
    }

    function updateBall() {
      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.x - ball.r < gameRect.x) {
        ball.x = gameRect.x + ball.r;
        ball.vx = Math.abs(ball.vx);
      }

      if (ball.x + ball.r > gameRect.x + gameRect.w) {
        ball.x = gameRect.x + gameRect.w - ball.r;
        ball.vx = -Math.abs(ball.vx);
      }

      if (ball.y - ball.r < gameRect.y) {
        ball.y = gameRect.y + ball.r;
        ball.vy = Math.abs(ball.vy);
      }

      if (
        ball.x + ball.r > bat.x &&
        ball.x - ball.r < bat.x + bat.w &&
        ball.y + ball.r > bat.y &&
        ball.y - ball.r < bat.y + bat.h &&
        ball.vy > 0
      ) {
        ball.y = bat.y - ball.r - 1;
        ball.vy = -Math.abs(ball.vy);

        const offset = (ball.x - (bat.x + bat.w / 2)) / (bat.w / 2);
        ball.vx = offset * Math.max(Math.abs(ball.vx), settings.ballSpeedX * 1.25);
      }

      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        if (
          ball.x + ball.r > b.x &&
          ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y &&
          ball.y - ball.r < b.y + b.h
        ) {
          const overlapLeft = (ball.x + ball.r) - b.x;
          const overlapRight = (b.x + b.w) - (ball.x - ball.r);
          const overlapTop = (ball.y + ball.r) - b.y;
          const overlapBottom = (b.y + b.h) - (ball.y - ball.r);

          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

          if (minOverlap === overlapLeft) {
            ball.x = b.x - ball.r - 1;
            ball.vx = -Math.abs(ball.vx);
          } else if (minOverlap === overlapRight) {
            ball.x = b.x + b.w + ball.r + 1;
            ball.vx = Math.abs(ball.vx);
          } else if (minOverlap === overlapTop) {
            ball.y = b.y - ball.r - 1;
            ball.vy = -Math.abs(ball.vy);
          } else {
            ball.y = b.y + b.h + ball.r + 1;
            ball.vy = Math.abs(ball.vy);
          }

          b.hp -= 1;
          state.score += 10;

          if (b.hp <= 0) {
            blocks.splice(i, 1);
            state.score += 20;
          }
          break;
        }
      }

      if (ball.y - ball.r > gameRect.y + gameRect.h) {
        state.lives -= 1;

        if (state.lives <= 0) {
          state.gameOver = true;
          state.started = false;
        } else {
          resetLevelBall();
        }
      }

      if (blocks.length === 0) {
        state.level += 1;
        state.lives = 3;
        buildBlocks();
        ball.vx *= 1.08;
        ball.vy *= 1.08;
        resetLevelBall();
      }
    }

    function drawRoundedRect(x, y, width, height, radius, fill, stroke = null, lineWidth = 1) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();

      ctx.fillStyle = fill;
      ctx.fill();

      if (stroke) {
        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = stroke;
        ctx.stroke();
      }
    }

    function drawLayout() {
      ctx.clearRect(0, 0, w, h);

      const bg = ctx.createLinearGradient(0, 0, 0, h);
      bg.addColorStop(0, "#0d1220");
      bg.addColorStop(1, "#111111");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      drawRoundedRect(gameRect.x, gameRect.y, gameRect.w, gameRect.h, 20, "#191e32", "#00ffc8", 3);
      drawRoundedRect(sideRect.x, sideRect.y, sideRect.w, sideRect.h, 16, "#161822", "#373c50", 2);

      ctx.strokeStyle = "#009678";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(gameRect.x + 34, gameRect.y + 18);
      ctx.lineTo(gameRect.x + gameRect.w - 34, gameRect.y + 18);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(gameRect.x + 34, gameRect.y + gameRect.h - 18);
      ctx.lineTo(gameRect.x + gameRect.w - 34, gameRect.y + gameRect.h - 18);
      ctx.stroke();
    }

    function drawBat() {
      drawRoundedRect(bat.x, bat.y + 6, bat.w, bat.h, 10, "#005a52");
      drawRoundedRect(bat.x, bat.y, bat.w, bat.h, 10, "#00ffc8");

      const coreX = bat.x + 13;
      const coreY = bat.y + 4;
      const coreW = bat.w - 26;
      const coreH = bat.h - 8;
      drawRoundedRect(coreX, coreY, coreW, coreH, 6, "#dcfffa");
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = "#ff5a00";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = "#ffaa00";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r / 2, 0, Math.PI * 2);
      ctx.fillStyle = "#fff0c8";
      ctx.fill();
    }

    function drawBlocks() {
      for (const b of blocks) {
        let fill = "#ffdc5a";
        if (b.hp === 3) fill = "#ff508c";
        else if (b.hp === 2) fill = "#ff9650";

        drawRoundedRect(b.x, b.y, b.w, b.h, 9, fill, "#fff0e6", 2);
      }
    }

    function drawSidePanel() {
      ctx.fillStyle = "#f0f5ff";
      ctx.font = "bold 22px Arial";
      ctx.fillText("HOW TO PLAY", sideRect.x + 18, sideRect.y + 32);

      ctx.strokeStyle = "#009678";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sideRect.x + 18, sideRect.y + 52);
      ctx.lineTo(sideRect.x + sideRect.w - 18, sideRect.y + 52);
      ctx.stroke();

      drawRoundedRect(sideRect.x + 14, sideRect.y + 70, sideRect.w - 28, 250, 16, "#1e2232", "#373c50", 2);

      ctx.fillStyle = "#aab4d2";
      ctx.font = "18px Arial";

      const lines = [
        `Level: ${state.level}`,
        `Lives: ${state.lives}/3`,
        "",
        "Move: Mouse or ◀ ▶",
        "Pause: P",
        "Start: Space",
        "",
        `Score: ${state.score}`,
        "",
        "Goal:",
        "Clear all blocks"
      ];

      let y = sideRect.y + 98;
      for (const line of lines) {
        ctx.fillText(line, sideRect.x + 28, y);
        y += 22;
      }

      drawRoundedRect(sideRect.x + 14, sideRect.y + sideRect.h - 90, sideRect.w - 28, 64, 16, "#1c2030", "#373c50", 2);

      ctx.fillStyle = "#aab4d2";
      ctx.font = "16px Arial";
      ctx.fillText("STATUS", sideRect.x + 28, sideRect.y + sideRect.h - 62);

      ctx.fillStyle = "#f0f5ff";
      ctx.font = "bold 22px Arial";
      let statusText = "READY";
      if (state.paused) statusText = "PAUSED";
      else if (state.gameOver) statusText = "GAME OVER";
      else if (state.started) statusText = "PLAY";
      ctx.fillText(statusText, sideRect.x + 28, sideRect.y + sideRect.h - 32);
    }

    function drawCenterMessage(title, subtitle) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, w, h);

      const cardW = 560;
      const cardH = 220;
      const cardX = w / 2 - cardW / 2;
      const cardY = h / 2 - cardH / 2;

      drawRoundedRect(cardX, cardY + 10, cardW, cardH, 22, "rgba(0,0,0,0.4)");
      drawRoundedRect(cardX, cardY, cardW, cardH, 22, "#1c2237", "#00ffc8", 3);

      ctx.fillStyle = "#f0f5ff";
      ctx.font = "bold 40px Arial";
      ctx.textAlign = "center";
      ctx.fillText(title, w / 2, cardY + 78);

      ctx.fillStyle = "#aab4d2";
      ctx.font = "20px Arial";
      ctx.fillText(subtitle, w / 2, cardY + 118);

      ctx.font = "18px Arial";
      ctx.fillText("Press SPACE to start", w / 2, cardY + 165);

      ctx.textAlign = "left";
    }

    function update() {
      if (!state.started || state.paused || state.gameOver) return;
      updateBat();
      updateBall();
    }

    function draw() {
      drawLayout();
      drawBlocks();
      drawBat();
      drawBall();
      drawSidePanel();

      if (!state.started && !state.gameOver) {
        drawCenterMessage("PING PONG", "Smooth paddle physics inside the hub panel");
      }

      if (state.paused) {
        drawCenterMessage("PAUSED", "Press P to continue");
      }

      if (state.gameOver) {
        drawCenterMessage("GAME OVER", "Press SPACE to restart");
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * canvas.width;
      state.mouseX = x;

      if (state.lastMouseX !== null && Math.abs(x - state.lastMouseX) > 6) {
        state.mouseEnabled = true;
      }
      state.lastMouseX = x;
    });

    window.addEventListener("keydown", (e) => {
      if (["ArrowLeft", "ArrowRight", "Space", "KeyP"].includes(e.code)) {
        e.preventDefault();
      }

      if (e.code === "ArrowLeft") state.leftPressed = true;
      if (e.code === "ArrowRight") state.rightPressed = true;

      if (e.code === "Space") {
        if (state.gameOver) {
          state.score = 0;
          state.lives = 3;
          state.level = 1;
          state.paused = false;
          state.started = true;
          state.gameOver = false;
          resetBatAndBall();
        } else {
          state.started = true;
        }
      }

      if (e.code === "KeyP" && state.started && !state.gameOver) {
        state.paused = !state.paused;
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft") state.leftPressed = false;
      if (e.code === "ArrowRight") state.rightPressed = false;
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    loop();
  </script>
</body>
</html>
